name: basic-training-sandbox

hosts:
  - name: attacker
    flavor: m1.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

  - name: victim
    flavor: m1.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian

routers:
  - name: router
    flavor: m1.tiny
    base_box:
      image: cirros
      mgmt_user: cirros

networks:
  - name: dmz-net
    cidr: 10.0.1.0/24

  - name: lan-net
    cidr: 10.0.2.0/24

net_mappings:
  - host: attacker
    network: dmz-net
    ip: 10.0.1.10

  - host: victim
    network: lan-net
    ip: 10.0.2.20

router_mappings:
  - router: router
    network: dmz-net
    ip: 10.0.1.1

  - router: router
    network: lan-net
    ip: 10.0.2.1

groups:
  - name: default-group
    nodes:
      - attacker
      - victim
