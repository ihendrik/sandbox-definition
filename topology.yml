name: basic-training-sandbox

networks:
  - name: dmz_net
    cidr: 10.0.1.0/24
  - name: lan_net
    cidr: 10.0.2.0/24

hosts:
  - name: router
    base_box:
      image: cirros
      mgmt_user: cirros
    interfaces:
      - network: dmz_net
        ip: 10.0.1.1
      - network: lan_net
        ip: 10.0.2.1

  - name: attacker
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
    interfaces:
      - network: dmz_net
        ip: 10.0.1.10

  - name: victim
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    interfaces:
      - network: lan_net
        ip: 10.0.2.20
